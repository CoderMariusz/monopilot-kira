# SKILL-MAP — map fazy i moduły -> skille
# Używany przez Claude i agenty do automatycznego loadu na starcie sesji

metadata:
  version: 1.0.0
  last_updated: 2026-04-17
  source_registry: REGISTRY.yaml
  purpose: "Map which skills to invoke for each phase/module/task-type in Monopilot Migration"

# ---------- PHASE -> SKILLS ----------
phases:
  phase-0-meta-spec:
    required: [architecture-adr, documentation-patterns, schema-driven-design, rule-engine-dsl, multi-tenant-variation, reality-sync-workflow]
    optional: [prd-structure]
    rationale: "Writing META-MODEL + 4 ADRs + REALITY-SYNC + 4 new skills + consolidation"

  phase-A-pld-v7-reality:
    required: [documentation-patterns, discovery-interview-patterns, reality-sync-workflow]
    optional: [food-industry-mes]
    rationale: "Documenting external reality (PLD v7 Excel) into _meta/reality-sources/. Food-industry-mes full draft written here."

  phase-D-architecture-closure:
    required: [architecture-adr, documentation-patterns, schema-driven-design, multi-tenant-variation]
    optional: []
    rationale: "Reconcile 16 modules with NPD-first order, close architecture decisions"

  phase-B-npd-update:
    required: [monopilot-patterns, invest-stories, prd-structure, documentation-patterns, schema-driven-design]
    optional: [multi-tenant-variation, rule-engine-dsl, food-industry-mes]
    rationale: "Update NPD module 1:1 with PLD v7 reality"

  phase-C-module-swarm:
    agent-required: [documentation-patterns, prd-structure, monopilot-patterns, schema-driven-design]
    agent-optional: [rule-engine-dsl, multi-tenant-variation, food-industry-mes]
    rationale: "Agent propagates NPD pattern to 15 remaining modules"

