services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: monopilot
      POSTGRES_USER: monopilot
      POSTGRES_PASSWORD: monopilot
    ports:
      - "5432:5432"
    volumes:
      - monopilot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monopilot -d monopilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  monopilot_postgres_data:
