<!doctype html><html><body><form data-testid="nutrition-tab" data-mode="edit" data-state="empty" class="space-y-4 p-1"><header><h2 class="text-base font-semibold tracking-tight">Nutrition (per 100 g)</h2><p class="mt-0.5 text-sm" style="color: var(--muted);">Per-100 g nutrient declaration and inherited EU-14 allergens. Used to compute the finished-good label.</p></header><fieldset class="card"><legend class="text-xs font-semibold uppercase tracking-wide" style="color: var(--muted);">Per 100 g</legend><div class="mt-2 grid gap-3 sm:grid-cols-2"><div class="ff"><label for="nutr-energy_kj">Energy (kJ)</label><span data-slot="input" style="display: contents;"><input class="mp-field-control form-input" id="nutr-energy_kj" inputmode="decimal" aria-label="Energy (kJ)" data-testid="nutr-energy_kj" value="" name="energy_kj"></span></div><div class="ff"><label for="nutr-fat_g">Fat (g)</label><span data-slot="input" style="display: contents;"><input class="mp-field-control form-input" id="nutr-fat_g" inputmode="decimal" aria-label="Fat (g)" data-testid="nutr-fat_g" value="" name="fat_g"></span></div><div class="ff"><label for="nutr-saturates_g">Saturates (g)</label><span data-slot="input" style="display: contents;"><input class="mp-field-control form-input" id="nutr-saturates_g" inputmode="decimal" aria-label="Saturates (g)" data-testid="nutr-saturates_g" value="" name="saturates_g"></span></div><div class="ff"><label for="nutr-carbs_g">Carbohydrate (g)</label><span data-slot="input" style="display: contents;"><input class="mp-field-control form-input" id="nutr-carbs_g" inputmode="decimal" aria-label="Carbohydrate (g)" data-testid="nutr-carbs_g" value="" name="carbs_g"></span></div><div class="ff"><label for="nutr-sugars_g">Sugars (g)</label><span data-slot="input" style="display: contents;"><input class="mp-field-control form-input" id="nutr-sugars_g" inputmode="decimal" aria-label="Sugars (g)" data-testid="nutr-sugars_g" value="" name="sugars_g"></span></div><div class="ff"> t-sm"><input data-testid="allergen-A09" type="checkbox"><span>Celery</span></label></li><li><label class="flex items-center gap-2 text-sm"><input data-testid="allergen-A10" type="checkbox"><span>Mustard</span></label></li><li><label class="flex items-center gap-2 text-sm"><input data-testid="allergen-A11" type="checkbox"><span>Sesame</span></label></li><li><label class="flex items-center gap-2 text-sm"><input data-testid="allergen-A12" type="checkbox"><span>Sulphites</span></label></li><li><label class="flex items-center gap-2 text-sm"><input data-testid="allergen-A13" type="checkbox"><span>Lupin</span></label></li><li><label class="flex items-center gap-2 text-sm"><input data-testid="allergen-A14" type="checkbox"><span>Molluscs</span></label></li></ul></fieldset><div class="flex justify-end"><button data-slot="button" data-variant="default" class="btn btn-primary" type="submit" disabled="" data-testid="nutrition-save">Save nutrition</button></div></form></body></html>
