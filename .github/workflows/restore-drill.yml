name: RESTORE_DRILL_QUARTERLY

on:
  schedule:
    - cron: '0 5 1 */3 *'
  workflow_dispatch:

concurrency:
  group: restore-drill-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_ENV: test
  DRILL_DUMP_PATH: drill-reports/empty-baseline.sql
  DRILL_DATABASE_URL: postgres://monopilot:monopilot@localhost:5432/restore_drill_target
  APP_USER_PASSWORD: app-user-test-password

jobs:
  drill:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: monopilot
          POSTGRES_PASSWORD: monopilot
          POSTGRES_DB: restore_drill_target
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U monopilot -d restore_drill_target"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prepare empty logical dump
        run: |
          mkdir -p drill-reports
          printf -- '-- T-122 quarterly restore drill empty baseline\n' > "$DRILL_DUMP_PATH"
      - run: pnpm drill
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: restore-drill-report
          path: drill-reports/*.json
          if-no-files-found: error
